<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - HD Networking</title>
  <meta name="description" content="Thank you for your enquiry. HD Networking will reply as soon as possible." />
  <style>
    :root {
      --bg: #07070b;
      --bg-soft: #10101a;
      --panel: #141424;
      --panel-2: #1a1a2d;
      --text: #f6f1df;
      --muted: #c8bdd5;
      --gold: #d9a83f;
      --gold-soft: #f1d38a;
      --purple: #5f2f88;
      --purple-2: #7a3fb1;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 20px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(122,63,177,0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(217,168,63,0.14), transparent 24%),
        linear-gradient(180deg, #09090f 0%, #0c0c14 45%, #07070b 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(12px);
      background: rgba(7,7,11,0.78);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #120d00;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      box-shadow: 0 10px 30px rgba(217,168,63,0.24);
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 15px;
      transition: color .2s ease;
    }

    .nav-links a.btn-primary {
      color: #000000;
    }

    .nav-links a:hover { color: var(--gold-soft); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid transparent;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      color: #000000;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      box-shadow: 0 12px 32px rgba(217,168,63,0.22);
    }

    .thank-you-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
    }

    .thank-you-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 620px;
      width: 100%;
    }

    .thank-you-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(217,168,63,0.18), rgba(122,63,177,0.24));
      color: var(--gold-soft);
      font-size: 34px;
      margin: 0 auto 24px;
    }

    .thank-you-card h1 {
      font-size: clamp(28px, 4vw, 40px);
      margin: 0 0 16px;
      line-height: 1.2;
    }

    .thank-you-card p {
      color: var(--muted);
      font-size: 18px;
      margin: 0 0 28px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    footer {
      border-top: 1px solid var(--border);
      color: var(--muted);
      padding: 24px 0 40px;
      margin-top: auto;
    }

    .footer-wrap {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .nav { align-items: flex-start; flex-direction: column; }
      .thank-you-card { padding: 36px 24px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="container nav">
      <a href="/" class="brand">
        <div class="brand-mark">HD</div>
        <div>
          HD Networking
          <small>Small business network & WiFi services</small>
        </div>
      </a>
      <div class="nav-links">
        <a href="/#about">About</a>
        <a href="/#services">Services</a>
        <a href="/#why">Why Us</a>
        <a href="/#contact">Contact</a>
        <a href="/#contact" class="btn btn-primary">Request a Quote</a>
      </div>
    </div>
  </div>

  <main class="thank-you-section">
    <div class="container">
      <div class="thank-you-card">
        <div class="thank-you-icon">✓</div>
        <h1>Thank you for your enquiry</h1>
        <p>Your message has been received. We will do our best to reply as soon as possible.</p>
        <a href="/" class="btn btn-primary">Back to Home</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="container footer-wrap">
      <div>&copy; 2026 HD Networking. All rights reserved.</div>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/#about">About</a>
        <a href="/#services">Services</a>
        <a href="/#contact">Contact</a>
      </div>
    </div>
  </footer>
</body>
</html>
